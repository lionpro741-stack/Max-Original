<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат с {{ opponent.username }}</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #e6ddd3; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #075e54; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .header a { color: white; text-decoration: none; font-size: 14px; }
        .chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .message { max-width: 70%; padding: 10px 15px; margin-bottom: 10px; border-radius: 10px; position: relative; word-wrap: break-word; }
        .my-msg { align-self: flex-end; background: #dcf8c6; }
        .their-msg { align-self: flex-start; background: white; }
        .message .time { font-size: 10px; text-align: right; color: gray; margin-top: 5px; }
        .input-area { background: #f0f0f0; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 14px; }
        button { background: #075e54; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-size: 14px; }
        button:hover { background: #054d44; }
        .empty-chat { text-align: center; color: #999; padding: 40px; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <strong>{{ opponent.username }}</strong>
        </div>
        <a href="/chats">← Назад к чатам</a>
    </div>

    <div class="chat-window" id="chatWindow">
        {% if messages %}
            {% for msg in messages %}
                <div class="message {% if msg.sender_id == current_user_id %}my-msg{% else %}their-msg{% endif %}">
                    {{ msg.text }}
                    <div class="time">{{ msg.timestamp }}</div>
                </div>
            {% endfor %}
        {% else %}
            <div class="empty-chat">Нет сообщений. Напишите первое!</div>
        {% endif %}
    </div>

    <form class="input-area" id="messageForm" action="/send_message/{{ chat_id }}" method="post">
        <input type="text" name="text" id="messageInput" placeholder="Введите сообщение..." required autocomplete="off">
        <button type="submit">Отправить</button>
    </form>

    <script>
        // Автопрокрутка вниз при загрузке
        const chatWindow = document.getElementById('chatWindow');
        chatWindow.scrollTop = chatWindow.scrollHeight;

        // Автообновление чата каждые 3 секунды
        let lastMessageCount = {{ messages|length }};

        setInterval(async () => {
            try {
                const response = await fetch('/api/messages/{{ chat_id }}');
                const data = await response.json();

                if (data.messages.length !== lastMessageCount) {
                    lastMessageCount = data.messages.length;
                    
                    // Перезагружаем страницу для отображения новых сообщений
                    window.location.reload();
                }
            } catch (e) {
                console.error('Ошибка получения сообщений:', e);
            }
        }, 3000);

        // Отправка формы и очистка поля
        document.getElementById('messageForm').addEventListener('submit', function(e) {
            const input = document.getElementById('messageInput');
            if (input.value.trim() === '') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
